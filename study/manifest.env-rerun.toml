[study]
name = "unsafe-study"
output_root = "/tmp/unsafe-audit-env-rerun"
fuzz_time = 15
fuzz_env = { ASAN_OPTIONS = "detect_leaks=0" }

[[crate]]
name = "httparse"
path = "targets/httparse"
cohort = "baseline"
coverage_tier = "tier1"

[[crate.miri_case]]
name = "upstream_full"
scope = "full_suite"

[[crate.miri_case]]
name = "streaming_values"
scope = "targeted"
harness_dir = "extensions_harness"
test = "api_smoke"
case = "serde_json_streams_multiple_values"
exact = true

[[crate.miri_case]]
name = "escape_and_number_edges"
scope = "targeted"
harness_dir = "extensions_harness"
test = "api_smoke"
case = "serde_json_handles_escape_and_number_edges"
exact = true

[[crate.fuzz_group]]
name = "existing_parser_targets"
budget_label = "baseline"
all = true

