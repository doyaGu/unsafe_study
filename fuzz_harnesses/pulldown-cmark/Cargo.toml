[package]
name = "pulldown-cmark-study-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
pulldown-cmark = { path = "../../targets/pulldown-cmark/pulldown-cmark" }

[[bin]]
name = "pulldown_cmark_parse"
