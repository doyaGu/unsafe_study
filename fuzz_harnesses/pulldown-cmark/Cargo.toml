doc = false

[[bin]]
name = "pulldown_cmark_events"
path = "fuzz_targets/pulldown_cmark_events.rs"
test = false
doc = false

[[bin]]
name = "pulldown_cmark_offsets"
path = "fuzz_targets/pulldown_cmark_offsets.rs"
test = false
doc = false